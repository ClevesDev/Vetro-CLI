name: vetro
description: >-
  AI code debt scanner. Detects technical debt patterns specific to 
  AI-generated code using deterministic mathematical analysis on ASTs.
version: 0.1.0
repository: https://github.com/ClevesDev/Vetro-CLI

environment:
  sdk: ^3.11.0

dependencies:
  analyzer: ^7.4.0
  args: ^2.6.0
  glob: ^2.1.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0

executables:
  vetro: vetro
